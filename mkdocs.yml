site_name: Programming robots in ROS
site_url: https://abc-irobotics.github.io/ros_course_materials_en/
site_description: Programming robots in ROS
site_author: Tamas Levendovics

nav:
    - Home: index.md
    #- Materials:
    - 1. Introduction: 01_intro.md
    - 2. Linux and ROS principles: 02_linux_ros_principles.md
    - 3. Python principles, ROS Publisher, ROS Subscriber: 03_python_principles.md
    - 4. Principles of robotics, da Vinci: 04_da_vinci.md
    - 5. Roslaunch, msg, action, service: 05_roslaunch.md
    - 6. Versioning, Git: 07_git.md
    - 7. Kinematics, inverse kinematics: 06_robotics_principles.md
    - 8. ROS Service, ROS Action concept, and their use: 08_service_action.md
    - Projects: projects.md
    

theme:
  name: material
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      primary: orange
      accent: aubergine
      toggle:
        icon: material/lightbulb
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: orange
      accent: aubergine
      toggle:
        icon: material/lightbulb-outline
        name: Switch to light mode
  language: en
  features:
    #- navigation.tabs
    - toc.integrate
  custom_dir: overrides
 
extra:                                              
  alternate:  
    - name: English
      link: https://abc-irobotics.github.io/ros_course_materials_en/
      lang: en

    - name: Hungarian
      link: https://abc-irobotics.github.io/ros_course_materials_hu/
      lang: hu
   
plugins:
    - search
    - pdf-export
   
       
      
markdown_extensions:
    - pymdownx.arithmatex:
        generic: true 
    - mkdocs_graphviz
    - admonition
    - pymdownx.details
    - pymdownx.superfences
    - attr_list
    - md_in_html
    - tables

    
copyright: Copyright &copy; 2026 <a href="mailto:tamas.daniel.nagy@irob.uni-obuda.hu">Tamas Levendovics</a>.


extra_javascript:
    - javascripts/mathjax.js
    - https://polyfill.io/v3/polyfill.min.js?features=es6
    - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
    - https://cdn.jsdelivr.net/gh/rod2ik/cdn@main/mkdocs/javascripts/mkdocs-graphviz.js
    

